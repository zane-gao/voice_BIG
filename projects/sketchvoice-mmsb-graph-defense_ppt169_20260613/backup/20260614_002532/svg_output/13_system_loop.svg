<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <defs>
    <marker id="loopArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#155E75"/>
    </marker>
  </defs>
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">工程系统与科研闭环</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1"/>
  </g>
  <g id="loop-diagram">
    <rect x="96" y="160" width="250" height="126" fill="#FFFFFF" stroke="#155E75" stroke-width="2"/>
    <use data-icon="tabler-outline/pencil" x="126" y="198" width="34" height="34" fill="#155E75" stroke-width="2"/>
    <text x="178" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">交互输入</text>
    <text x="126" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">草图 · 录音 · 文本补充</text>
    <rect x="516" y="160" width="250" height="126" fill="#FFFFFF" stroke="#0F766E" stroke-width="2"/>
    <use data-icon="tabler-outline/network" x="546" y="198" width="34" height="34" fill="#0F766E" stroke-width="2"/>
    <text x="598" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">图结构生成</text>
    <text x="546" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">转写 · Mermaid · JSON</text>
    <rect x="936" y="160" width="250" height="126" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <use data-icon="tabler-outline/chart-dots" x="966" y="198" width="34" height="34" fill="#2563EB" stroke-width="2"/>
    <text x="1018" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">可编辑输出</text>
    <text x="966" y="258" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">SVG · 终稿图 · WebM</text>
    <rect x="516" y="438" width="250" height="126" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <use data-icon="tabler-outline/test-pipe" x="546" y="476" width="34" height="34" fill="#F59E0B" stroke-width="2"/>
    <text x="598" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">自动评测</text>
    <text x="546" y="536" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">对齐标准图 · 输出指标</text>
    <line x1="346" y1="223" x2="516" y2="223" stroke="#155E75" stroke-width="3" marker-end="url(#loopArrow)"/>
    <line x1="766" y1="223" x2="936" y2="223" stroke="#155E75" stroke-width="3" marker-end="url(#loopArrow)"/>
    <path d="M 1061 286 C 1061 390, 890 501, 766 501" fill="none" stroke="#155E75" stroke-width="3" marker-end="url(#loopArrow)"/>
    <path d="M 516 501 C 360 500, 222 400, 222 286" fill="none" stroke="#155E75" stroke-width="3" marker-end="url(#loopArrow)"/>
  </g>
  <g id="system-stack">
    <rect x="144" y="612" width="992" height="42" fill="#155E75"/>
    <text x="640" y="640" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">FastAPI 后端托管静态前端，形成“输入 - 生成 - 输出 - 评测”的端到端演示系统</text>
  </g>
  <g id="footer">
    <text x="52" y="682" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">System loop</text>
    <text x="1228" y="682" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">13</text>
  </g>
</svg>

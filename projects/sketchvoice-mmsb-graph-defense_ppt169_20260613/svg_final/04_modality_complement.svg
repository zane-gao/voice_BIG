<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC" />
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">模态互补性：草图给结构，语音给语义</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1" />
  </g>
  <g id="sketch-side">
    <rect x="80" y="160" width="460" height="350" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
    <rect x="80" y="160" width="460" height="66" fill="#E0F2FE" />
    
  <g transform="translate(110.0, 178.0) scale(1.4166666666666667)" fill="none" stroke="#155E75" stroke-width="2">
    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
    <path d="M13.5 6.5l4 4" />
  </g>
    <text x="160" y="204" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#155E75">草图</text>
    <text x="120" y="272" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">优势</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="120" y="315">能表达二维结构</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="120" y="351">能表达上下游、分支和闭环</text><line x1="120" y1="372" x2="500" y2="372" stroke="#CBD5E1" stroke-width="1" />
    <text x="120" y="418" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">缺陷</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" font-size="20" x="120" y="460">节点名称可能不规范或缺失</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" font-size="20" x="120" y="494">箭头方向可能断裂或错误</text></g>
  <g id="speech-side">
    <rect x="740" y="160" width="460" height="350" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
    <rect x="740" y="160" width="460" height="66" fill="#CCFBF1" />
    
  <g transform="translate(770.0, 178.0) scale(1.4166666666666667)" fill="none" stroke="#0F766E" stroke-width="2">
    <path d="M9 5a3 3 0 0 1 3 -3a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3a3 3 0 0 1 -3 -3l0 -5" />
    <path d="M5 10a7 7 0 0 0 14 0" />
    <path d="M8 21l8 0" />
    <path d="M12 17l0 4" />
  </g>
    <text x="820" y="204" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#0F766E">语音</text>
    <text x="780" y="272" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">优势</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="780" y="315">可表达完整语义和顺序关系</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="780" y="351">可补充因果、约束和设计意图</text><line x1="780" y1="372" x2="1160" y2="372" stroke="#CBD5E1" stroke-width="1" />
    <text x="780" y="418" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">缺陷</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" font-size="20" x="780" y="460">没有二维布局信息</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#475569" font-size="20" x="780" y="494">无法直接表达结构图形状</text></g>
  <g id="center-takeaway">
    <line x1="540" y1="335" x2="740" y2="335" stroke="#155E75" stroke-width="3" />
    <polygon points="640,305 676,335 640,365 604,335" fill="#FFFFFF" stroke="#155E75" stroke-width="3" />
    <text x="640" y="327" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#155E75">互补</text>
    <text x="640" y="351" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#475569">融合</text>
    <text x="640" y="590" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#172033">利用语音作为语义锚点，补全草图中的结构缺失</text>
  </g>
  <g id="footer">
    <text x="52" y="682" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">Modality complementarity</text>
    <text x="1228" y="682" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">04</text>
  </g>
</svg>
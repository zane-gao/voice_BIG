<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC" />
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">实验设置：五类对比方法</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1" />
  </g>
  <g id="method-list">
    <line x1="140" y1="160" x2="140" y2="564" stroke="#155E75" stroke-width="4" />
    <g id="method-1">
      <circle cx="140" cy="184" r="22" fill="#155E75" />
      <text x="140" y="191" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">1</text>
      <text x="190" y="176" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">草图单模态</text>
      <text x="190" y="208" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">只使用空间结构，检验视觉信息的基础能力。</text>
    </g>
    <g id="method-2">
      <circle cx="140" cy="274" r="22" fill="#0F766E" />
      <text x="140" y="281" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">2</text>
      <text x="190" y="266" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">语音单模态</text>
      <text x="190" y="298" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">只使用语义顺序，检验语音对节点和方向的补全能力。</text>
    </g>
    <g id="method-3">
      <circle cx="140" cy="364" r="22" fill="#2563EB" />
      <text x="140" y="371" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">3</text>
      <text x="190" y="356" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">早期融合</text>
      <text x="190" y="388" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">合并草图和语音候选图，检验简单融合的上限。</text>
    </g>
    <g id="method-4">
      <circle cx="140" cy="454" r="22" fill="#F59E0B" />
      <text x="140" y="461" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">4</text>
      <text x="190" y="446" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">贪心修复</text>
      <text x="190" y="478" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">局部补边和纠错，检验非全局路径优化的效果。</text>
    </g>
    <g id="method-5">
      <circle cx="140" cy="544" r="22" fill="#172033" />
      <text x="140" y="551" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">5</text>
      <text x="190" y="536" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">MMSB-Graph</text>
      <text x="190" y="568" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">通过图编辑桥恢复全局一致结构，并记录路径能量。</text>
    </g>
  </g>
  <g id="boundary-box">
    <rect x="830" y="188" width="330" height="286" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" />
    
  <g transform="translate(870.0, 230.0) scale(1.5833333333333333)" fill="none" stroke="#F59E0B" stroke-width="2">
    <path d="M20 8.04l-12.122 12.124a2.857 2.857 0 1 1 -4.041 -4.04l12.122 -12.124" />
    <path d="M7 13h8" />
    <path d="M19 15l1.5 1.6a2 2 0 1 1 -3 0l1.5 -1.6" />
    <path d="M15 3l6 6" />
  </g>
    <text x="928" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">真实性边界</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="870" y="322">当前实验属于</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#F59E0B" font-size="20" x="870" y="360" font-weight="800">合成条件图的可控验证</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="870" y="408">用于验证任务定义、</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="20" x="870" y="442">评测链路和图编辑过程。</text></g>
  <g id="footer">
    <text x="52" y="682" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">Experiment setup</text>
    <text x="1228" y="682" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">11</text>
  </g>
</svg>
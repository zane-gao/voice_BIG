    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="888" y="292">构建交互输入到</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="888" y="330">可评测输出的闭环</text><text x="888" y="358" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">支持方法图生成、编辑与指标报告。</text>

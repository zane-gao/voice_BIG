    <text x="561" y="226" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#0F766E">方法层</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="503" y="292">提出 MMSB-Graph</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="503" y="330">图编辑桥框架</text><text x="503" y="358" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">将图生成转化为路径优化问题。</text>

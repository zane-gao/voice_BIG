    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
  </g>
    <text x="176" y="226" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#155E75">任务层</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="118" y="292">提出语音引导的</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="21" x="118" y="330">知识草图结构化任务</text><text x="118" y="358" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">把“边说边画”形式化为可研究问题。</text>
  </g>
  <g id="contribution-method">
    <rect x="465" y="160" width="350" height="230" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
    

    <rect x="850" y="160" width="350" height="230" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" />
    
  <g transform="translate(888.0, 198.0) scale(1.5833333333333333)" fill="none" stroke="#F59E0B" stroke-width="2">

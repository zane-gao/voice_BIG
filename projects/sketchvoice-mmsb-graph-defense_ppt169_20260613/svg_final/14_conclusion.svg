    <text x="640" y="514" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">一句话总结</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" text-anchor="middle" fill="#FFFFFF" font-size="22" x="640" y="556">本项目将“语音 + 草图”的自然表达过程抽象为多模态知识结构恢复问题，</text><text font-family="Microsoft YaHei, Arial, sans-serif" text-anchor="middle" fill="#FFFFFF" font-size="22" x="640" y="590">并用图编辑桥实现从不完整表达到可编辑知识图的可解释重建。</text></g>

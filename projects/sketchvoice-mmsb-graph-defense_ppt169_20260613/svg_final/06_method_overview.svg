    <g id="pipeline-arrows" fill="#155E75">
      <polygon points="286,317 310,303 310,331" />
      <polygon points="516,317 540,303 540,331" />
      <polygon points="746,317 770,303 770,331" />
      <polygon points="976,317 1000,303 1000,331" />

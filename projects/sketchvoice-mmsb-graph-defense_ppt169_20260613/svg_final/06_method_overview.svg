      <text x="643" y="236" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#2563EB">融合候选图</text>
      <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="574" y="300">合并节点</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="574" y="332">对齐边</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="574" y="364">保留布局</text><text x="643" y="404" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="20" font-weight="700" fill="#2563EB">G_f</text>

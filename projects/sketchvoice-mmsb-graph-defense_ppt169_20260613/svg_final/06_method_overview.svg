      <text x="413" y="236" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F766E">语音讲述 U</text>
      <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="344" y="300">转写文本</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="344" y="332">节点短语</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="344" y="364">关系顺序</text><text x="413" y="404" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="20" font-weight="700" fill="#0F766E">G_u</text>
    </g>
    <g id="stage-3">
      <rect x="548" y="202" width="190" height="230" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />

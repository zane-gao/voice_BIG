      <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="114" y="300">框图</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="114" y="332">箭头</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#172033" font-size="18" x="114" y="364">空间布局</text><text x="183" y="404" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="20" font-weight="700" fill="#155E75">G_s</text>
    </g>

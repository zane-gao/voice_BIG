  <g id="method-takeaway">
    <rect x="112" y="548" width="1056" height="78" fill="#155E75" />
    <text x="640" y="580" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">核心思想：不直接一步生成最终图，而是通过可解释编辑路径逐步恢复结构</text>
    <text x="640" y="612" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#E0F2FE">多模态约束 + 离散图编辑路径优化</text>

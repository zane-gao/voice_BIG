<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <defs>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#155E75"/>
    </marker>
  </defs>
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">图编辑桥：逐步恢复而非一步生成</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1"/>
  </g>
  <g id="flow-path">
    <line x1="120" y1="340" x2="1160" y2="340" stroke="#155E75" stroke-width="4" marker-end="url(#arrowHead)"/>
    <g id="edit-insert-node">
      <circle cx="160" cy="340" r="42" fill="#E0F2FE" stroke="#155E75" stroke-width="3"/>
      <text x="160" y="333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">插入</text>
      <text x="160" y="358" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#475569">节点</text>
    </g>
    <g id="edit-delete-node">
      <circle cx="390" cy="340" r="42" fill="#FFFFFF" stroke="#155E75" stroke-width="3"/>
      <text x="390" y="333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">删除</text>
      <text x="390" y="358" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#475569">多余点</text>
    </g>
    <g id="edit-insert-edge">
      <circle cx="620" cy="340" r="42" fill="#CCFBF1" stroke="#0F766E" stroke-width="3"/>
      <text x="620" y="333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">插入</text>
      <text x="620" y="358" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#475569">缺失边</text>
    </g>
    <g id="edit-delete-edge">
      <circle cx="850" cy="340" r="42" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
      <text x="850" y="333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">删除</text>
      <text x="850" y="358" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#475569">错误边</text>
    </g>
    <g id="edit-direction">
      <circle cx="1080" cy="340" r="42" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
      <text x="1080" y="333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">修正</text>
      <text x="1080" y="358" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#475569">方向</text>
    </g>
  </g>
  <g id="before-after">
    <rect x="80" y="162" width="272" height="92" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="216" y="196" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">初始候选图</text>
    <text x="216" y="226" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="20" fill="#475569">G_f</text>
    <rect x="928" y="162" width="272" height="92" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1064" y="196" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">规范知识图</text>
    <text x="1064" y="226" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="20" fill="#475569">G_hat</text>
  </g>
  <g id="why-not-one-step">
    <rect x="92" y="500" width="500" height="88" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="122" y="534" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">一步生成的问题</text>
    <text x="122" y="566" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">不可解释 · 不可诊断 · 错误难定位</text>
    <rect x="688" y="500" width="500" height="88" fill="#FFFFFF" stroke="#155E75" stroke-width="2"/>
    <text x="718" y="534" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#155E75">图编辑方式的优势</text>
    <text x="718" y="566" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">追踪错误来源 · 分析每步代价 · 符合人工修改过程</text>
  </g>
  <g id="footer">
    <text x="52" y="682" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">Graph editing bridge</text>
    <text x="1228" y="682" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">08</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">任务定义：Speech-Guided Sketch-to-Knowledge-Graph</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1"/>
  </g>
  <g id="definition-left">
    <rect x="72" y="150" width="520" height="420" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <use data-icon="tabler-outline/target" x="112" y="190" width="42" height="42" fill="#155E75" stroke-width="2"/>
    <text x="172" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="800" fill="#155E75">给定输入</text>
    <rect x="112" y="268" width="180" height="82" fill="#E0F2FE" stroke="#155E75" stroke-width="2"/>
    <text x="202" y="300" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">草图 S</text>
    <text x="202" y="328" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">空间结构</text>
    <rect x="372" y="268" width="180" height="82" fill="#CCFBF1" stroke="#0F766E" stroke-width="2"/>
    <text x="462" y="300" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">语音 U</text>
    <text x="462" y="328" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">语义锚点</text>
    <line x1="292" y1="309" x2="372" y2="309" stroke="#CBD5E1" stroke-width="2"/>
    <text x="332" y="302" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">+</text>
    <text x="332" y="432" text-anchor="middle" font-family="Consolas, Courier New, monospace" font-size="34" font-weight="700" fill="#172033">G_hat = (V, E)</text>
    <text x="332" y="474" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#475569">目标是重建可编辑知识图，而不是只生成图片</text>
  </g>
  <g id="schema-right">
    <rect x="652" y="150" width="556" height="190" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <use data-icon="tabler-outline/network" x="692" y="186" width="38" height="38" fill="#0F766E" stroke-width="2"/>
    <text x="748" y="214" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#0F766E">节点 V</text>
    <text x="692" y="264" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#172033">
      <tspan x="692" dy="0">标签 · 语义类型 · 解释 · 置信度</tspan>
    </text>
    <text x="692" y="304" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">回答“图中有哪些概念，它们是什么意思”。</text>
    <rect x="652" y="380" width="556" height="190" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <use data-icon="tabler-outline/route" x="692" y="416" width="38" height="38" fill="#155E75" stroke-width="2"/>
    <text x="748" y="444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="800" fill="#155E75">边 E</text>
    <text x="692" y="494" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#172033">
      <tspan x="692" dy="0">方向 · 关系类型 · 关系标签 · 置信度</tspan>
    </text>
    <text x="692" y="534" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">回答“概念之间如何连接、方向是否正确”。</text>
  </g>
  <g id="takeaway">
    <rect x="72" y="608" width="1136" height="54" fill="#155E75"/>
    <text x="640" y="643" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800" fill="#FFFFFF">本质：从多模态不完整表达中恢复结构化图表示</text>
  </g>
  <g id="footer">
    <text x="52" y="690" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">Task definition</text>
    <text x="1228" y="690" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">03</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <g id="header">
    <text x="52" y="74" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">相关工作与研究空白</text>
    <line x1="52" y1="104" x2="1228" y2="104" stroke="#CBD5E1" stroke-width="1"/>
  </g>
  <g id="track-sketch">
    <rect x="70" y="150" width="360" height="300" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="70" y="150" width="360" height="10" fill="#155E75"/>
    <text x="100" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Sketch-to-Diagram</text>
    <text x="100" y="252" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#475569">
      <tspan x="100" dy="0">手绘草图解析为</tspan>
      <tspan x="100" dy="32">流程图 / 结构图</tspan>
    </text>
    <line x1="100" y1="320" x2="400" y2="320" stroke="#CBD5E1"/>
    <text x="100" y="362" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#155E75">问题</text>
    <text x="100" y="396" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">缺少语音语义辅助</text>
  </g>
  <g id="track-code">
    <rect x="460" y="150" width="360" height="300" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="460" y="150" width="360" height="10" fill="#0F766E"/>
    <text x="490" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Image-to-Code</text>
    <text x="490" y="252" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#475569">
      <tspan x="490" dy="0">流程图转 Mermaid</tspan>
      <tspan x="490" dy="32">或 JSON 可编辑表示</tspan>
    </text>
    <line x1="490" y1="320" x2="790" y2="320" stroke="#CBD5E1"/>
    <text x="490" y="362" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#0F766E">问题</text>
    <text x="490" y="396" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">输入静态，不符合边说边画</text>
  </g>
  <g id="track-bridge">
    <rect x="850" y="150" width="360" height="300" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="850" y="150" width="360" height="10" fill="#2563EB"/>
    <text x="880" y="206" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="800" fill="#172033">Graph Diffusion / SB</text>
    <text x="880" y="252" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" fill="#475569">
      <tspan x="880" dy="0">图结构生成与</tspan>
      <tspan x="880" dy="32">离散状态迁移</tspan>
    </text>
    <line x1="880" y1="320" x2="1180" y2="320" stroke="#CBD5E1"/>
    <text x="880" y="362" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#2563EB">问题</text>
    <text x="880" y="396" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">很少结合真实交互输入</text>
  </g>
  <g id="gap-summary">
    <rect x="70" y="505" width="1140" height="104" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="100" y="546" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">研究空白总结</text>
    <text x="100" y="586" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#172033">
      <tspan x="100" dy="0">1. 语音作为结构约束信号</tspan>
      <tspan x="450" dy="0">2. 草图 + 语音联合建模</tspan>
      <tspan x="800" dy="0">3. 面向用户修改成本的图编辑</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="52" y="682" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">Related work</text>
    <text x="1228" y="682" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#94A3B8">05</text>
  </g>
</svg>

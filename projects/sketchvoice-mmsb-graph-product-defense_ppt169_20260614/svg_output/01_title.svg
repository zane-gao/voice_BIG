<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="tealBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#155E75"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
    <circle cx="1116" cy="132" r="168" fill="#E0F2FE"/>
    <circle cx="1116" cy="132" r="104" fill="#CCFBF1" fill-opacity="0.85"/>
    <rect x="60" y="54" width="86" height="8" rx="4" fill="url(#tealBlue)"/>
  </g>
  <g id="title-block">
    <text x="92" y="188" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="64" font-weight="800" fill="#172033">SketchVoice</text>
    <text x="92" y="254" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="42" font-weight="800" fill="#155E75">语音 + 草图 → 科研方法图</text>
    <text x="96" y="314" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" fill="#475569">一个可演示的 AI 产品原型，也是一个可继续研究的多模态结构化任务</text>
    <rect x="96" y="354" width="720" height="50" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <text x="122" y="386" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">把课堂、科研讨论和白板草稿，一键转化为可编辑、可展示、可讲解的结构化方法图</text>
  </g>
  <g id="flow-motif">
    <rect x="790" y="228" width="338" height="70" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/pencil" x="820" y="246" width="34" height="34" fill="#155E75" stroke-width="2"/>
    <text x="874" y="273" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="20" font-weight="800" fill="#172033">手绘草图：空间结构</text>
    <rect x="850" y="338" width="338" height="70" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/microphone" x="880" y="356" width="34" height="34" fill="#0F766E" stroke-width="2"/>
    <text x="934" y="383" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="20" font-weight="800" fill="#172033">同步语音：语义锚点</text>
    <rect x="790" y="452" width="338" height="78" rx="8" fill="#155E75" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/network" x="820" y="474" width="34" height="34" fill="#FFFFFF" stroke-width="2"/>
    <text x="874" y="501" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="21" font-weight="800" fill="#FFFFFF">结构化知识图资产</text>
    <path d="M 958 302 L 958 333" fill="none" stroke="#0F766E" stroke-width="3" stroke-dasharray="7,6" marker-end="url(#arrow)"/>
    <path d="M 958 412 L 958 447" fill="none" stroke="#0F766E" stroke-width="3" stroke-dasharray="7,6" marker-end="url(#arrow)"/>
  </g>
  <g id="footer">
    <text x="92" y="650" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#94A3B8">语音信息处理课程结项答辩 · 2026</text>
    <text x="1188" y="650" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">01 / 14</text>
  </g>
</svg>

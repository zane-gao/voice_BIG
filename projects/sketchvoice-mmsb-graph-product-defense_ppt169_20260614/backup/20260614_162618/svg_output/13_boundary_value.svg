<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowBorder" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#CBD5E1"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">项目知识图谱：我们实际完成了哪些节点</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">把应用侧、科研侧和工程侧放到同一张图里，展示成果之间的依赖关系。</text>
  </g>
  <g id="graph-edges">
    <line x1="640" y1="348" x2="240" y2="190" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="176" y2="336" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="244" y2="504" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="510" y2="166" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="770" y2="166" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="1036" y2="190" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="1104" y2="336" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="1034" y2="506" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <line x1="640" y1="348" x2="640" y2="540" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrowBorder)"/>
    <path d="M 318 190 C 392 116 484 118 546 164" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="6,5"/>
    <path d="M 808 166 C 896 118 996 120 1062 184" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="6,5"/>
    <path d="M 304 508 C 430 610 820 610 974 510" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="6,5"/>
  </g>
  <g id="center-node">
    <rect x="536" y="292" width="208" height="112" rx="8" fill="#155E75" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/network" x="610" y="314" width="40" height="40" fill="#FFFFFF" stroke-width="2"/>
    <text x="640" y="374" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="26" font-weight="800" fill="#FFFFFF">SketchVoice</text>
    <text x="640" y="396" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#CCFBF1">speech + sketch to KG</text>
  </g>
  <g id="node-product">
    <rect x="86" y="146" width="244" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/device-desktop" x="108" y="174" width="32" height="32" fill="#2563EB" stroke-width="2"/>
    <text x="154" y="181" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">产品原型</text>
    <text x="154" y="209" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">Web 工作台、画布、录音、上传</text>
  </g>
  <g id="node-structure-output">
    <rect x="58" y="300" width="236" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/json" x="80" y="328" width="32" height="32" fill="#0F766E" stroke-width="2"/>
    <text x="126" y="335" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">结构输出</text>
    <text x="126" y="363" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">Mermaid、SVG、JSON 可下载</text>
  </g>
  <g id="node-media">
    <rect x="88" y="470" width="252" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/video" x="110" y="498" width="32" height="32" fill="#F59E0B" stroke-width="2"/>
    <text x="156" y="505" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">终稿与讲解</text>
    <text x="156" y="533" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">图像生成、TTS、光标讲解 WebM</text>
  </g>
  <g id="node-task">
    <rect x="410" y="128" width="230" height="84" rx="8" fill="#E0F2FE" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/target" x="432" y="154" width="30" height="30" fill="#2563EB" stroke-width="2"/>
    <text x="476" y="160" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">科研任务</text>
    <text x="476" y="187" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="13" fill="#475569">语音引导知识草图结构化</text>
  </g>
  <g id="node-method">
    <rect x="640" y="128" width="230" height="84" rx="8" fill="#CCFBF1" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/git-branch" x="662" y="154" width="30" height="30" fill="#0F766E" stroke-width="2"/>
    <text x="706" y="160" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">方法模型</text>
    <text x="706" y="187" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="13" fill="#475569">MMSB-Graph、图编辑桥、路径能量</text>
  </g>
  <g id="node-dataset">
    <rect x="950" y="146" width="244" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/database" x="972" y="174" width="32" height="32" fill="#155E75" stroke-width="2"/>
    <text x="1018" y="181" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">数据资产</text>
    <text x="1018" y="209" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">24 cases、gold graph、语音锚点</text>
  </g>
  <g id="node-eval">
    <rect x="986" y="300" width="236" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/chart-dots" x="1008" y="328" width="32" height="32" fill="#16A34A" stroke-width="2"/>
    <text x="1054" y="335" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">评测结果</text>
    <image href="../images/formula_13_metrics.png" x="1054" y="346" width="160" height="22" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="node-engineering">
    <rect x="940" y="470" width="252" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/server" x="962" y="498" width="32" height="32" fill="#2563EB" stroke-width="2"/>
    <text x="1008" y="505" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">工程保障</text>
    <text x="1008" y="533" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">FastAPI、mock fallback、分层服务</text>
  </g>
  <g id="node-explain">
    <rect x="510" y="520" width="260" height="92" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/timeline" x="532" y="548" width="32" height="32" fill="#0F766E" stroke-width="2"/>
    <text x="578" y="555" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">可解释轨迹</text>
    <text x="578" y="583" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">中间图、编辑序列、路径能量诊断</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · Project Knowledge Graph</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">13 / 14</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">相关工作：三条路线都没有同时覆盖我们的场景</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">研究空白不在“能不能生成图”，而在同步语音反馈、可编辑结构表示和用户修改成本诊断的结合。</text>
  </g>
  <g id="routes">
    <g id="route-sketch">
      <rect x="64" y="156" width="360" height="312" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="64" y="156" width="360" height="10" rx="5" fill="#2563EB"/>
      <use data-icon="tabler-outline/pencil" x="96" y="194" width="40" height="40" fill="#2563EB" stroke-width="2"/>
      <text x="154" y="220" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#172033">草图 → 结构图</text>
      <text x="96" y="268" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#155E75">代表问题</text>
      <text x="96" y="300" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">SketchAgent / Sketch2Diagram</text>
      <text x="96" y="332" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">关注手绘草图到机器可读图。</text>
      <line x1="96" y1="360" x2="392" y2="360" stroke="#CBD5E1"/>
      <text x="96" y="394" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#F59E0B">缺口</text>
      <text x="96" y="426" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">主要依赖视觉草图，较少建模</text>
      <text x="96" y="452" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">同步语音带来的语义反馈。</text>
    </g>
    <g id="route-code">
      <rect x="460" y="156" width="360" height="312" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="460" y="156" width="360" height="10" rx="5" fill="#0F766E"/>
      <use data-icon="tabler-outline/code" x="492" y="194" width="40" height="40" fill="#0F766E" stroke-width="2"/>
      <text x="550" y="220" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#172033">图像 → 可编辑代码</text>
      <text x="492" y="268" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#155E75">代表问题</text>
      <text x="492" y="300" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">Flowchart2Mermaid</text>
      <text x="492" y="332" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">强调输出 Mermaid 等结构化表示。</text>
      <line x1="492" y1="360" x2="788" y2="360" stroke="#CBD5E1"/>
      <text x="492" y="394" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#F59E0B">缺口</text>
      <text x="492" y="426" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">多处理已有静态流程图，难覆盖</text>
      <text x="492" y="452" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">实时草图与口头讲述的开放场景。</text>
    </g>
    <g id="route-bridge">
      <rect x="856" y="156" width="360" height="312" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="856" y="156" width="360" height="10" rx="5" fill="#F59E0B"/>
      <use data-icon="tabler-outline/git-branch" x="888" y="194" width="40" height="40" fill="#F59E0B" stroke-width="2"/>
      <text x="946" y="220" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#172033">图结构桥 / SB</text>
      <text x="888" y="268" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#155E75">理论启发</text>
      <text x="888" y="300" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">Schrödinger Bridge / DDSBM</text>
      <text x="888" y="332" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">把生成看成分布间动态迁移。</text>
      <line x1="888" y1="360" x2="1184" y2="360" stroke="#CBD5E1"/>
      <text x="888" y="394" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#F59E0B">迁移点</text>
      <text x="888" y="426" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">我们不是像素级扩散，而是在</text>
      <text x="888" y="452" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">离散知识图空间做编辑迁移。</text>
    </g>
  </g>
  <g id="position">
    <rect x="118" y="522" width="1044" height="86" rx="8" fill="#155E75" filter="url(#softShadow)"/>
    <text x="640" y="556" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="23" font-weight="800" fill="#FFFFFF">我们的切入点：Sketch + Speech → Structured Knowledge Graph → Graph Editing Diagnosis</text>
    <text x="640" y="590" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" fill="#E0F2FE">补上同步语音反馈，并把最终结果和用户修改成本都放进可评测的图编辑路径中。</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · Related Work Gap</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">08 / 14</text>
  </g>
</svg>

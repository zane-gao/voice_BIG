<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPrimary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#155E75"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">MMSB-Graph：多模态约束下的离散图编辑桥</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">用路径化编辑代替一次性生成，让最终图和恢复过程都可解释、可诊断、可评测。</text>
  </g>
  <g id="method-flow">
    <g id="gs">
      <rect x="58" y="158" width="170" height="96" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/pencil" x="82" y="180" width="32" height="32" fill="#2563EB" stroke-width="2"/>
      <image href="../images/formula_10_gs.png" x="110" y="170" width="51" height="43" preserveAspectRatio="xMidYMid meet"/>
      <text x="82" y="234" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">空间强，语义弱</text>
    </g>
    <g id="gu">
      <rect x="58" y="302" width="170" height="96" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/microphone" x="82" y="324" width="32" height="32" fill="#0F766E" stroke-width="2"/>
      <image href="../images/formula_10_gu.png" x="107" y="314" width="56" height="43" preserveAspectRatio="xMidYMid meet"/>
      <text x="82" y="378" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">语义强，布局弱</text>
    </g>
    <path d="M 232 206 C 296 206 300 268 352 278" fill="none" stroke="#155E75" stroke-width="3" marker-end="url(#arrowPrimary)"/>
    <path d="M 232 350 C 296 350 300 290 352 282" fill="none" stroke="#155E75" stroke-width="3" marker-end="url(#arrowPrimary)"/>
    <g id="gf">
      <rect x="356" y="224" width="196" height="120" rx="8" fill="#FEF3C7" stroke="#F59E0B" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/layers-linked" x="386" y="250" width="36" height="36" fill="#F59E0B" stroke-width="2"/>
      <image href="../images/formula_10_gf.png" x="421" y="244" width="56" height="50" preserveAspectRatio="xMidYMid meet"/>
      <text x="386" y="318" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">早期融合候选图</text>
    </g>
    <line x1="556" y1="284" x2="646" y2="284" stroke="#155E75" stroke-width="3" marker-end="url(#arrowPrimary)"/>
    <g id="bridge">
      <rect x="654" y="160" width="286" height="250" rx="8" fill="#155E75" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/git-branch" x="774" y="188" width="44" height="44" fill="#FFFFFF" stroke-width="2"/>
      <text x="797" y="260" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#FFFFFF">Graph Editing Bridge</text>
      <image href="../images/formula_10_path.png" x="674" y="278" width="246" height="29" preserveAspectRatio="xMidYMid meet"/>
      <text x="692" y="336" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#E0F2FE">删除多余节点 / 插入缺失节点</text>
      <text x="692" y="362" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#E0F2FE">删除错误边 / 插入目标边 / 修方向</text>
    </g>
    <line x1="944" y1="284" x2="1034" y2="284" stroke="#155E75" stroke-width="3" marker-end="url(#arrowPrimary)"/>
    <g id="ghat">
      <rect x="1042" y="208" width="178" height="152" rx="8" fill="#DCFCE7" stroke="#16A34A" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/network" x="1109" y="232" width="38" height="38" fill="#0F766E" stroke-width="2"/>
      <image href="../images/formula_10_ghat.png" x="1093" y="282" width="36" height="48" preserveAspectRatio="xMidYMid meet"/>
      <text x="1131" y="334" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">可编辑知识图</text>
    </g>
  </g>
  <g id="cost-model">
    <rect x="70" y="466" width="1140" height="130" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <text x="100" y="504" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="21" font-weight="800" fill="#172033">代价函数不是抽象符号，而是模拟用户真实修改成本</text>
    <image href="../images/formula_10_cost.png" x="100" y="518" width="520" height="68" preserveAspectRatio="xMidYMid meet"/>
    <text x="652" y="548" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">结构增删改对应手工改图；标签距离对应概念命名错误；</text>
    <text x="652" y="574" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">方向、布局与语音覆盖共同模拟真实修改成本。</text>
    <rect x="920" y="486" width="232" height="52" rx="8" fill="#CCFBF1"/>
    <image href="../images/formula_10_energy.png" x="936" y="494" width="200" height="46" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · MMSB-Graph Method</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">10 / 14</text>
  </g>
</svg>

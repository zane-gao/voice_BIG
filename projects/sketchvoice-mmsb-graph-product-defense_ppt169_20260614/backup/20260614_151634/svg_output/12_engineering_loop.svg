<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">可解释性：让生成结果能被追问、定位和改进</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">科研价值来自可诊断的结构恢复过程，而不是只输出一张看起来正确的图。</text>
  </g>
  <g id="cycle-left">
    <circle cx="402" cy="386" r="174" fill="none" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8,6"/>
    <circle cx="402" cy="386" r="92" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <text x="402" y="374" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#155E75">诊断闭环</text>
    <text x="402" y="406" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#0F766E">traceable graph repair</text>
    <path d="M 402 166 C 522 184 590 270 578 386" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrowTeal)"/>
    <path d="M 548 512 C 454 604 312 594 244 500" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrowTeal)"/>
    <path d="M 228 284 C 272 194 326 168 402 166" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrowTeal)"/>
    <g id="node-intermediate">
      <circle cx="402" cy="166" r="46" fill="#2563EB" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/layers-linked" x="381" y="145" width="42" height="42" fill="#FFFFFF" stroke-width="2"/>
      <text x="402" y="236" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">中间图对照</text>
    </g>
    <g id="node-path">
      <circle cx="578" cy="386" r="46" fill="#155E75" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/git-branch" x="557" y="365" width="42" height="42" fill="#FFFFFF" stroke-width="2"/>
      <text x="618" y="460" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">编辑路径</text>
    </g>
    <g id="node-metrics">
      <circle cx="244" cy="500" r="46" fill="#F59E0B" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/chart-dots" x="223" y="479" width="42" height="42" fill="#FFFFFF" stroke-width="2"/>
      <text x="220" y="572" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">指标回看</text>
    </g>
    <g id="node-user">
      <circle cx="228" cy="284" r="46" fill="#16A34A" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/device-desktop" x="207" y="263" width="42" height="42" fill="#FFFFFF" stroke-width="2"/>
      <text x="204" y="356" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">用户修改</text>
    </g>
  </g>
  <g id="evidence-panel">
    <rect x="720" y="154" width="500" height="428" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <text x="758" y="198" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="24" font-weight="800" fill="#172033">四类解释证据</text>
    <line x1="758" y1="222" x2="1178" y2="222" stroke="#CBD5E1"/>
    <g id="evidence-1">
      <rect x="758" y="252" width="72" height="34" rx="8" fill="#E0F2FE"/>
      <text x="794" y="275" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#2563EB">Gs/Gu</text>
      <text x="850" y="275" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">定位错误来源</text>
      <text x="850" y="303" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">视觉缺语义、语音缺布局、融合图残余冲突。</text>
    </g>
    <g id="evidence-2">
      <rect x="758" y="330" width="72" height="34" rx="8" fill="#CCFBF1"/>
      <text x="794" y="353" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#0F766E">G0:T</text>
      <text x="850" y="353" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">解释每一步修复</text>
      <text x="850" y="381" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">新增节点、补边、删错边、纠正方向都可回放。</text>
    </g>
    <g id="evidence-3">
      <rect x="758" y="408" width="72" height="34" rx="8" fill="#FEF3C7"/>
      <text x="794" y="431" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#F59E0B">GED↓</text>
      <text x="850" y="431" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">把解释落到指标</text>
      <text x="850" y="459" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">Normalized GED、Edit Cost、Path Energy 都能量化。</text>
    </g>
    <g id="evidence-4">
      <rect x="758" y="486" width="72" height="34" rx="8" fill="#DCFCE7"/>
      <text x="794" y="509" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#16A34A">trace</text>
      <text x="850" y="509" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="17" font-weight="800" fill="#172033">把用户反馈变成数据</text>
      <text x="850" y="537" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">真实修改轨迹可用于训练权重、排序器和交互策略。</text>
    </g>
  </g>
  <g id="bottom-takeaway">
    <rect x="176" y="612" width="928" height="44" rx="8" fill="#155E75"/>
    <text x="640" y="641" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#FFFFFF">这让系统从“能生成”提升为“能解释、能评测、能被真实使用数据持续改进”。</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · Explainability Loop</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">12 / 14</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FFFFFF"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">MMSB-Graph：把多模态输入放进同一图状态空间</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">核心不是直接“画好看”，而是在离散知识图空间里求一条低代价、可解释的结构恢复路径。</text>
  </g>
  <g id="constraint-sources">
    <g id="source-sketch">
      <rect x="70" y="168" width="280" height="118" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="70" y="168" width="8" height="118" rx="4" fill="#2563EB"/>
      <use data-icon="tabler-outline/pencil" x="100" y="196" width="40" height="40" fill="#2563EB" stroke-width="2"/>
      <text x="158" y="211" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#2563EB">Gs</text>
      <text x="158" y="238" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">草图边缘约束</text>
      <text x="100" y="270" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">位置、邻接、箭头粗方向</text>
    </g>
    <g id="source-speech">
      <rect x="70" y="326" width="280" height="118" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="70" y="326" width="8" height="118" rx="4" fill="#0F766E"/>
      <use data-icon="tabler-outline/microphone" x="100" y="354" width="40" height="40" fill="#0F766E" stroke-width="2"/>
      <text x="158" y="369" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#0F766E">Gu</text>
      <text x="158" y="396" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">语音语义约束</text>
      <text x="100" y="428" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">节点标签、顺序、关系意图</text>
    </g>
    <g id="source-fusion">
      <rect x="70" y="484" width="280" height="118" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <rect x="70" y="484" width="8" height="118" rx="4" fill="#F59E0B"/>
      <use data-icon="tabler-outline/layers-linked" x="100" y="512" width="40" height="40" fill="#F59E0B" stroke-width="2"/>
      <text x="158" y="527" font-family="Consolas, monospace" font-size="22" font-weight="700" fill="#F59E0B">Gf</text>
      <text x="158" y="554" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" font-weight="800" fill="#172033">早期融合候选</text>
      <text x="100" y="586" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">初始图与多模态锚点</text>
    </g>
  </g>
  <g id="bridge-model">
    <path d="M 354 226 C 452 226 455 330 536 352" fill="none" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <path d="M 354 384 C 450 384 464 374 536 362" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrowTeal)"/>
    <path d="M 354 542 C 452 542 455 398 536 372" fill="none" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrowAmber)"/>
    <rect x="540" y="178" width="360" height="364" rx="8" fill="#155E75" filter="url(#softShadow)"/>
    <text x="720" y="228" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="28" font-weight="800" fill="#FFFFFF">离散图编辑桥</text>
    <text x="720" y="260" text-anchor="middle" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#CCFBF1">P(G0:T) in graph state space</text>
    <g id="graph-path">
      <circle cx="618" cy="350" r="24" fill="#E0F2FE" stroke="#FFFFFF" stroke-width="2"/>
      <circle cx="686" cy="350" r="24" fill="#CCFBF1" stroke="#FFFFFF" stroke-width="2"/>
      <circle cx="754" cy="350" r="24" fill="#FEF3C7" stroke="#FFFFFF" stroke-width="2"/>
      <circle cx="822" cy="350" r="24" fill="#DCFCE7" stroke="#FFFFFF" stroke-width="2"/>
      <line x1="642" y1="350" x2="662" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)"/>
      <line x1="710" y1="350" x2="730" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)"/>
      <line x1="778" y1="350" x2="798" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)"/>
      <text x="618" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">G0</text>
      <text x="686" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">G1</text>
      <text x="754" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">...</text>
      <text x="822" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">GT</text>
    </g>
    <text x="576" y="470" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">min_P KL(P||R) + λs Cs + λu Cu + λf Cf</text>
    <text x="576" y="505" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#E0F2FE">R 是允许节点/边编辑的参考过程，三个 λ 控制草图、语音、融合约束权重。</text>
  </g>
  <g id="target-distribution">
    <path d="M 904 360 C 960 360 976 360 1018 360" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrowTeal)"/>
    <rect x="1020" y="208" width="190" height="304" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
    <use data-icon="tabler-outline/target" x="1094" y="246" width="48" height="48" fill="#16A34A" stroke-width="2"/>
    <text x="1115" y="330" text-anchor="middle" font-family="Consolas, monospace" font-size="26" font-weight="700" fill="#0F766E">G*</text>
    <text x="1115" y="363" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#172033">目标知识图</text>
    <text x="1115" y="404" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">节点、边、方向、标签</text>
    <text x="1115" y="432" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="15" fill="#475569">同时对齐标准结构</text>
  </g>
  <g id="bottom-takeaway">
    <rect x="420" y="584" width="520" height="54" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="680" y="618" text-anchor="middle" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#155E75">科研价值：把产品输出转成可优化、可约束、可诊断的图分布问题</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · MMSB-Graph Model</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">08 / 14</text>
  </g>
</svg>

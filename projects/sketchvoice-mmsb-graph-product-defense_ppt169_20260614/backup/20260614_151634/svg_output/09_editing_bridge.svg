<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#155E75"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E"/>
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC"/>
  </g>
  <g id="header">
    <text x="60" y="70" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="36" font-weight="800" fill="#172033">训练与推理：先把编辑路径变成可计算对象</text>
    <text x="60" y="106" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="18" fill="#475569">当前实现验证图桥和指标链路；同一套路径表示也能扩展为可监督训练与能量重排序。</text>
  </g>
  <g id="top-method-cards">
    <g id="current-implementation">
      <rect x="70" y="146" width="540" height="118" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/test-pipe" x="100" y="178" width="40" height="40" fill="#155E75" stroke-width="2"/>
      <text x="158" y="190" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="22" font-weight="800" fill="#172033">当前实现：确定性图编辑桥</text>
      <text x="158" y="222" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">用 gold graph 构造受控 sanity check，验证任务、指标和路径代价可运行。</text>
      <rect x="100" y="232" width="194" height="24" rx="8" fill="#E0F2FE"/>
      <text x="197" y="250" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#155E75">not large-scale training</text>
    </g>
    <g id="trainable-extension">
      <rect x="670" y="146" width="540" height="118" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/bulb" x="700" y="178" width="40" height="40" fill="#0F766E" stroke-width="2"/>
      <text x="758" y="190" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="22" font-weight="800" fill="#172033">可训练扩展：从路径学习策略</text>
      <text x="758" y="222" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">把人工修正轨迹、候选图和编辑序列转成 edit policy / energy reranker。</text>
      <rect x="700" y="232" width="222" height="24" rx="8" fill="#CCFBF1"/>
      <text x="811" y="250" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#0F766E">future trainable signal</text>
    </g>
  </g>
  <g id="inference-flow">
    <g id="step-candidates">
      <rect x="70" y="314" width="214" height="130" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/layers-linked" x="94" y="338" width="34" height="34" fill="#2563EB" stroke-width="2"/>
      <text x="146" y="362" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#172033">候选图构建</text>
      <text x="94" y="402" font-family="Consolas, monospace" font-size="16" font-weight="700" fill="#2563EB">Gs, Gu, Gf</text>
      <text x="94" y="428" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">统一到 MethodGraph</text>
    </g>
    <line x1="288" y1="379" x2="348" y2="379" stroke="#155E75" stroke-width="3" marker-end="url(#arrowMain)"/>
    <g id="step-actions">
      <rect x="356" y="314" width="214" height="130" rx="8" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/git-branch" x="380" y="338" width="34" height="34" fill="#155E75" stroke-width="2"/>
      <text x="432" y="362" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#172033">编辑动作空间</text>
      <text x="380" y="402" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">插入/删除节点</text>
      <text x="380" y="426" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">插入/删除边，修正方向</text>
    </g>
    <line x1="574" y1="379" x2="634" y2="379" stroke="#155E75" stroke-width="3" marker-end="url(#arrowMain)"/>
    <g id="step-cost">
      <rect x="642" y="314" width="214" height="130" rx="8" fill="#155E75" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/chart-dots" x="666" y="338" width="34" height="34" fill="#FFFFFF" stroke-width="2"/>
      <text x="718" y="362" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#FFFFFF">代价函数排序</text>
      <text x="666" y="402" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#E0F2FE">结构、语义、方向、布局</text>
      <text x="666" y="426" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#E0F2FE">减去语音覆盖奖励</text>
    </g>
    <line x1="860" y1="379" x2="920" y2="379" stroke="#155E75" stroke-width="3" marker-end="url(#arrowMain)"/>
    <g id="step-output">
      <rect x="928" y="314" width="282" height="130" rx="8" fill="#DCFCE7" stroke="#16A34A" filter="url(#softShadow)"/>
      <use data-icon="tabler-outline/network" x="952" y="338" width="34" height="34" fill="#0F766E" stroke-width="2"/>
      <text x="1004" y="362" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="19" font-weight="800" fill="#172033">输出图与编辑轨迹</text>
      <text x="952" y="402" font-family="Consolas, monospace" font-size="16" font-weight="700" fill="#0F766E">G_hat, G0:T, E(path)</text>
      <text x="952" y="428" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="14" fill="#475569">既能交付，也能诊断</text>
    </g>
  </g>
  <g id="math-panel">
    <rect x="70" y="490" width="740" height="114" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="100" y="526" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="20" font-weight="800" fill="#172033">单步编辑代价与路径能量</text>
    <text x="100" y="558" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#155E75">c(Gt,Gt+1)=c_GED+λlabel c_label+λdir c_direction+λlayout c_layout-λspeech r_coverage</text>
    <text x="100" y="590" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#0F766E">E(G0:T)=1/T Σ c(Gt,Gt+1)^2</text>
  </g>
  <g id="research-value">
    <rect x="846" y="490" width="364" height="114" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="876" y="526" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="20" font-weight="800" fill="#172033">科研价值不止一个分数</text>
    <text x="876" y="558" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">路径长度解释残余错误规模；路径能量解释</text>
    <text x="876" y="584" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="16" fill="#475569">修复是否自然；用户修改可反哺训练。</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">SketchVoice · Training and Inference</text>
    <text x="1220" y="680" text-anchor="end" font-family='"Microsoft YaHei", Arial, sans-serif' font-size="12" fill="#94A3B8">09 / 14</text>
  </g>
</svg>

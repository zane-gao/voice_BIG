<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC" />
  </g>
  <g id="header">
    <text x="60" y="70" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">数据与实验：把 demo 标注成可评测样例</text>
    <text x="60" y="106" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">我们不是只做几个展示样例，而是把输入、标准图、锚点和指标组织成可复现实验协议。</text>
  </g>
  <g id="dataset-panel">
    <path fill="#155E75" filter="url(#softShadow)" d="M72,150 H446 A8,8 0 0 1 454,158 V562 A8,8 0 0 1 446,570 H72 A8,8 0 0 1 64,562 V158 A8,8 0 0 1 72,150 Z" />
    
  <g transform="translate(98.0, 188.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M4 6a8 3 0 1 0 16 0a8 3 0 1 0 -16 0" />
    <path d="M4 6v6a8 3 0 0 0 16 0v-6" />
    <path d="M4 12v6a8 3 0 0 0 16 0v-6" />
  </g>
    <text x="160" y="217" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="27" font-weight="800" fill="#FFFFFF">24 个知识草图样例</text>
    <text x="98" y="284" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#CCFBF1">覆盖五类结构</text>
    <text x="98" y="318" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#E0F2FE">线性流程、多分支融合、反馈闭环、</text>
    <text x="98" y="346" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#E0F2FE">模型架构、实验流程。</text>
    <line x1="98" y1="382" x2="420" y2="382" stroke="#CCFBF1" stroke-opacity="0.55" />
    <text x="98" y="424" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#CCFBF1">每个样例标注</text>
    <text x="98" y="458" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#E0F2FE">gold nodes / gold edges / speech anchors</text>
    <text x="98" y="486" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#E0F2FE">sketch regions / layout coordinates / difficulty</text>
    <path fill="#CCFBF1" d="M106,516 H362 A8,8 0 0 1 370,524 V542 A8,8 0 0 1 362,550 H106 A8,8 0 0 1 98,542 V524 A8,8 0 0 1 106,516 Z" />
    <text x="234" y="539" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800" fill="#155E75">把产品样例变成科研数据</text>
  </g>
  <g id="baseline-table">
    <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M500,150 H1208 A8,8 0 0 1 1216,158 V388 A8,8 0 0 1 1208,396 H500 A8,8 0 0 1 492,388 V158 A8,8 0 0 1 500,150 Z" />
    <path fill="#155E75" d="M500,150 H1208 A8,8 0 0 1 1216,158 V186 A8,8 0 0 1 1208,194 H500 A8,8 0 0 1 492,186 V158 A8,8 0 0 1 500,150 Z" />
    <text x="522" y="179" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">对照方法</text>
    <text x="742" y="179" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF">验证意义</text>
    <line x1="492" y1="239" x2="1216" y2="239" stroke="#CBD5E1" />
    <line x1="492" y1="284" x2="1216" y2="284" stroke="#CBD5E1" />
    <line x1="492" y1="329" x2="1216" y2="329" stroke="#CBD5E1" />
    <line x1="670" y1="194" x2="670" y2="396" stroke="#CBD5E1" />
    <text x="522" y="224" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Sketch-only</text>
    <text x="696" y="224" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">只看空间结构，验证草图单模态短板。</text>
    <text x="522" y="269" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Speech-only</text>
    <text x="696" y="269" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">只看语义顺序，验证语音补关系的价值。</text>
    <text x="522" y="314" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Early Fusion</text>
    <text x="696" y="314" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">简单合并两模态，验证 one-shot 融合不足。</text>
    <text x="522" y="359" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Greedy / MMSB</text>
    <text x="696" y="359" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">比较局部修复与全局约束编辑路径。</text>
  </g>
  <g id="metric-panel">
    <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M500,428 H1208 A8,8 0 0 1 1216,436 V562 A8,8 0 0 1 1208,570 H500 A8,8 0 0 1 492,562 V436 A8,8 0 0 1 500,428 Z" />
    <text x="522" y="468" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">指标组合</text>
    <image href="data:image/png;base64," x="522" y="488.21" width="360" height="37.57" />
    <image href="data:image/png;base64," x="522" y="526.18" width="398" height="32.64" />
    <path fill="#FEF3C7" d="M926,454 H1148 A8,8 0 0 1 1156,462 V486 A8,8 0 0 1 1148,494 H926 A8,8 0 0 1 918,486 V462 A8,8 0 0 1 926,454 Z" />
    <text x="1037" y="480" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" font-weight="800" fill="#F59E0B">当前是合成条件图可控验证</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">SketchVoice · Evaluation Dataset and Protocol</text>
    <text x="1220" y="680" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">11 / 14</text>
  </g>
</svg>
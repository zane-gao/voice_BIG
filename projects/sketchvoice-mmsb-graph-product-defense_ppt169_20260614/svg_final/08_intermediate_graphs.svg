    <text x="720" y="260" text-anchor="middle" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#CCFBF1">P(G0:T) in graph state space</text>
    <g id="graph-path">
      <circle cx="618" cy="350" r="24" fill="#E0F2FE" stroke="#FFFFFF" stroke-width="2" />
      <circle cx="686" cy="350" r="24" fill="#CCFBF1" stroke="#FFFFFF" stroke-width="2" />
      <circle cx="754" cy="350" r="24" fill="#FEF3C7" stroke="#FFFFFF" stroke-width="2" />
      <circle cx="822" cy="350" r="24" fill="#DCFCE7" stroke="#FFFFFF" stroke-width="2" />
      <line x1="642" y1="350" x2="662" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)" />
      <line x1="710" y1="350" x2="730" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)" />
      <line x1="778" y1="350" x2="798" y2="350" stroke="#FFFFFF" stroke-width="3" marker-end="url(#arrowWhite)" />
      <text x="618" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">G0</text>
      <text x="686" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">G1</text>
      <text x="754" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">...</text>
      <text x="822" y="414" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#E0F2FE">GT</text>
    </g>
    <text x="576" y="470" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">min_P KL(P||R) + λs Cs + λu Cu + λf Cf</text>
    <text x="576" y="505" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#E0F2FE">R 是允许节点/边编辑的参考过程，三个 λ 控制草图、语音、融合约束权重。</text>
  </g>

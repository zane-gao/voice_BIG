      <text x="720" y="434" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">论文风格方法图</text>
    </g>
    <line x1="775" y1="318" x2="860" y2="318" stroke="#155E75" stroke-width="3" marker-end="url(#arrowDemo)" />
    <g id="step-narrate">
      <circle cx="910" cy="318" r="46" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" />
      
  <g transform="translate(888.0, 296.0) scale(1.8333333333333333)" fill="none" stroke="#F59E0B" stroke-width="2">
    <path d="M18 8a3 3 0 0 1 0 6" />

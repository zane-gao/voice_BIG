      <text x="910" y="404" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">生成讲解</text>
      <text x="910" y="434" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">光标跟随段落</text>
    </g>
    <line x1="965" y1="318" x2="1050" y2="318" stroke="#155E75" stroke-width="3" marker-end="url(#arrowDemo)" />
    <g id="step-export">
      <circle cx="1100" cy="318" r="46" fill="url(#flowGrad)" stroke="#0F766E" stroke-width="2" />
      
  <g transform="translate(1078.0, 296.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M14 3v4a1 1 0 0 0 1 1h4" />
    <path d="M11.5 21h-4.5a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v5m-5 6h7m-3 -3l3 3l-3 3" />
  </g>
      <text x="1100" y="404" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">下载交付</text>
      <text x="1100" y="434" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#475569">SVG / JSON / WebM</text>
    </g>
  </g>
  <g id="demo-script">
    <path fill="#155E75" d="M102,520 H1178 A8,8 0 0 1 1186,528 V588 A8,8 0 0 1 1178,596 H102 A8,8 0 0 1 94,588 V528 A8,8 0 0 1 102,520 Z" />
    <text x="122" y="550" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">推荐现场演示口径</text>
    <text x="122" y="580" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#E0F2FE">画一个“输入数据 → 模型 → 评测指标”的简单草图，再用语音补充中间步骤，最后展示 Mermaid、SVG、JSON、终稿图和讲解 WebM。</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">SketchVoice · Live Demo Flow</text>
    <text x="1220" y="680" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">05 / 14</text>

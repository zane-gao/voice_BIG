  <g transform="translate(128.0, 296.0) scale(1.8333333333333333)" fill="none" stroke="#155E75" stroke-width="2">
    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
    <path d="M13.5 6.5l4 4" />
  </g>
      <text x="150" y="404" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033">画草图</text>
      <text x="150" y="434" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">科研流程骨架</text>
    </g>
    <line x1="205" y1="318" x2="290" y2="318" stroke="#155E75" stroke-width="3" marker-end="url(#arrowDemo)" />

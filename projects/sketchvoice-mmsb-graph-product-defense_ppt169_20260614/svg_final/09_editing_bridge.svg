    <text x="60" y="106" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">当前实现验证图桥和指标链路；同一套路径表示也能扩展为可监督训练与能量重排序。</text>
  </g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <marker id="arrowPrimary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#155E75" />
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC" />
  </g>
  <g id="header">
    <text x="60" y="70" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">任务定义：Speech-Guided Sketch-to-Knowledge-Graph</text>
    <text x="60" y="106" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">把“画得像不像”转化为“结构是否恢复正确”，这是科研问题成立的关键。</text>
  </g>
  <g id="formal-flow">
    <g id="input-sketch">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M78,150 H312 A8,8 0 0 1 320,158 V270 A8,8 0 0 1 312,278 H78 A8,8 0 0 1 70,270 V158 A8,8 0 0 1 78,150 Z" />
      
  <g transform="translate(96.0, 184.0) scale(1.5833333333333333)" fill="none" stroke="#2563EB" stroke-width="2">
    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
    <path d="M13.5 6.5l4 4" />
  </g>
      <image href="data:image/png;base64," x="147" y="178" width="30" height="36" />
      <text x="152" y="235" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">手绘知识草图</text>
      <text x="96" y="262" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#475569">框、箭头、空间布局、手写文字</text>
    </g>
    <g id="input-speech">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M78,314 H312 A8,8 0 0 1 320,322 V434 A8,8 0 0 1 312,442 H78 A8,8 0 0 1 70,434 V322 A8,8 0 0 1 78,314 Z" />
      
  <g transform="translate(96.0, 348.0) scale(1.5833333333333333)" fill="none" stroke="#0F766E" stroke-width="2">
    <path d="M9 5a3 3 0 0 1 3 -3a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3a3 3 0 0 1 -3 -3l0 -5" />
    <path d="M5 10a7 7 0 0 0 14 0" />
    <path d="M8 21l8 0" />
    <path d="M12 17l0 4" />
  </g>
      <image href="data:image/png;base64," x="147" y="342" width="34" height="35" />
      <text x="152" y="399" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">同步语音描述</text>
      <text x="96" y="426" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#475569">节点名称、顺序、关系、动机</text>
    </g>
    <line x1="324" y1="296" x2="430" y2="296" stroke="#155E75" stroke-width="4" marker-end="url(#arrowPrimary)" />
    <g id="task-box">
      <path fill="#155E75" filter="url(#softShadow)" d="M446,178 H810 A8,8 0 0 1 818,186 V406 A8,8 0 0 1 810,414 H446 A8,8 0 0 1 438,406 V186 A8,8 0 0 1 446,178 Z" />
      
  <g transform="translate(594.0, 210.0) scale(1.9166666666666667)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
    <path d="M7 12a5 5 0 1 0 10 0a5 5 0 1 0 -10 0" />
    <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
  </g>
      <text x="628" y="286" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="27" font-weight="800" fill="#FFFFFF">结构恢复函数</text>
      <image href="data:image/png;base64," x="494" y="296" width="268" height="60" />
      <text x="628" y="360" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#E0F2FE">不是图像生成，而是节点、边、方向和布局的联合预测。</text>
    </g>
    <line x1="822" y1="296" x2="928" y2="296" stroke="#155E75" stroke-width="4" marker-end="url(#arrowPrimary)" />
    <g id="output-graph">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M944,150 H1202 A8,8 0 0 1 1210,158 V434 A8,8 0 0 1 1202,442 H944 A8,8 0 0 1 936,434 V158 A8,8 0 0 1 944,150 Z" />
      
  <g transform="translate(1048.0, 184.0) scale(1.9166666666666667)" fill="none" stroke="#16A34A" stroke-width="2">
    <path d="M6 9a6 6 0 1 0 12 0a6 6 0 0 0 -12 0" />
    <path d="M12 3c1.333 .333 2 2.333 2 6s-.667 5.667 -2 6" />
    <path d="M12 3c-1.333 .333 -2 2.333 -2 6s.667 5.667 2 6" />
    <path d="M6 9h12" />
    <path d="M3 20h7" />
    <path d="M14 20h7" />
    <path d="M10 20a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
    <path d="M12 15v3" />
  </g>
      <image href="data:image/png;base64," x="955" y="228" width="236" height="60" />
      <text x="966" y="304" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">节点属性</text>
      <text x="966" y="332" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#475569">标签、语义类型、解释、置信度</text>
      <text x="966" y="372" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">边属性</text>
      <text x="966" y="400" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" fill="#475569">起点、终点、关系类型、方向</text>
    </g>
  </g>
  <g id="evaluation-targets">
    <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M78,502 H1202 A8,8 0 0 1 1210,510 V586 A8,8 0 0 1 1202,594 H78 A8,8 0 0 1 70,586 V510 A8,8 0 0 1 78,502 Z" />
    <text x="100" y="536" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#155E75">评测目标</text>
    <text x="100" y="570" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#475569">节点是否正确、边是否正确、方向是否正确、语音关键概念是否覆盖、草图布局是否保持、用户后续修改成本是否降低。</text>
    <path fill="#CCFBF1" d="M920,526 H1150 A8,8 0 0 1 1158,534 V552 A8,8 0 0 1 1150,560 H920 A8,8 0 0 1 912,552 V534 A8,8 0 0 1 920,526 Z" />
    <text x="1035" y="549" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#155E75">结构预测问题，而非美观评分</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">SketchVoice · Formal Task</text>
    <text x="1220" y="680" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">09 / 14</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E" />
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC" />
  </g>
  <g id="header">
    <text x="60" y="72" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">工程闭环：产品、模型、评测可以互相反馈</text>
    <text x="60" y="106" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">完整性体现在“用户可操作、模型可替换、结果可评测”。</text>
  </g>
  <g id="cycle">
    <circle cx="430" cy="388" r="170" fill="none" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8,6" />
    <text x="430" y="378" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="26" font-weight="800" fill="#155E75">SketchVoice</text>
    <text x="430" y="412" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">产品与科研闭环</text>
    <path d="M 430 188 C 550 210 618 305 600 418" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)" />
    <path d="M 560 520 C 468 610 330 594 260 490" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)" />
    <path d="M 252 290 C 300 200 350 182 430 188" fill="none" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)" />
    <g id="node-input">
      <circle cx="430" cy="188" r="48" fill="#155E75" filter="url(#softShadow)" />
      
  <g transform="translate(408.0, 166.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
    <path d="M13.5 6.5l4 4" />
  </g>
      <text x="430" y="260" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">用户输入</text>
    </g>
    <g id="node-generate">
      <circle cx="600" cy="418" r="48" fill="#2563EB" filter="url(#softShadow)" />
      
  <g transform="translate(578.0, 396.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M6 21l15 -15l-3 -3l-15 15l3 3" />
    <path d="M15 6l3 3" />
    <path d="M9 3a2 2 0 0 0 2 2a2 2 0 0 0 -2 2a2 2 0 0 0 -2 -2a2 2 0 0 0 2 -2" />
    <path d="M19 13a2 2 0 0 0 2 2a2 2 0 0 0 -2 2a2 2 0 0 0 -2 -2a2 2 0 0 0 2 -2" />
  </g>
      <text x="642" y="492" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">模型生成</text>
    </g>
    <g id="node-evaluate">
      <circle cx="260" cy="490" r="48" fill="#F59E0B" filter="url(#softShadow)" />
      
  <g transform="translate(238.0, 468.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M3 3v18h18" />
    <path d="M7 9a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M17 7a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M12 15a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M10.16 10.62l2.34 2.88" />
    <path d="M15.088 13.328l2.837 -4.586" />
  </g>
      <text x="236" y="566" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">自动评测</text>
    </g>
    <g id="node-deliver">
      <circle cx="252" cy="290" r="48" fill="#16A34A" filter="url(#softShadow)" />
      
  <g transform="translate(230.0, 268.0) scale(1.8333333333333333)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M14 3v4a1 1 0 0 0 1 1h4" />
    <path d="M11.5 21h-4.5a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v5m-5 6h7m-3 -3l3 3l-3 3" />
  </g>
      <text x="228" y="364" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">导出交付</text>
    </g>
  </g>
  <g id="right-panel">
    <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M778,176 H1172 A8,8 0 0 1 1180,184 V564 A8,8 0 0 1 1172,572 H778 A8,8 0 0 1 770,564 V184 A8,8 0 0 1 778,176 Z" />
    <text x="808" y="222" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">闭环带来的工程价值</text>
    <line x1="808" y1="250" x2="1144" y2="250" stroke="#CBD5E1" />
    <text x="808" y="296" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#155E75">1. 可演示</text>
    <text x="808" y="326" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">mock 模式和样例数据保证课堂展示不断。</text>
    <text x="808" y="374" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#155E75">2. 可替换</text>
    <text x="808" y="404" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">ASR、结构化模型、图像和 TTS 服务分层接入。</text>
    <text x="808" y="452" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#155E75">3. 可评测</text>
    <text x="808" y="482" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">预测图与标准图对齐，输出结构化指标。</text>
    <path fill="#CCFBF1" d="M816,520 H1106 A8,8 0 0 1 1114,528 V546 A8,8 0 0 1 1106,554 H816 A8,8 0 0 1 808,546 V528 A8,8 0 0 1 816,520 Z" />
    <text x="961" y="543" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="800" fill="#155E75">输入 → 生成 → 交付 → 评测 → 迭代</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">SketchVoice · Engineering Loop</text>
    <text x="1220" y="680" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">12 / 14</text>
  </g>
</svg>
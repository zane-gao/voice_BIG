  <g id="evidence-panel">
    <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M728,154 H1212 A8,8 0 0 1 1220,162 V574 A8,8 0 0 1 1212,582 H728 A8,8 0 0 1 720,574 V162 A8,8 0 0 1 728,154 Z" />
    <text x="758" y="198" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">四类解释证据</text>
    <line x1="758" y1="222" x2="1178" y2="222" stroke="#CBD5E1" />
    <g id="evidence-1">
      <path fill="#E0F2FE" d="M766,252 H822 A8,8 0 0 1 830,260 V278 A8,8 0 0 1 822,286 H766 A8,8 0 0 1 758,278 V260 A8,8 0 0 1 766,252 Z" />
      <text x="794" y="275" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#2563EB">Gs/Gu</text>
      <text x="850" y="275" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">定位错误来源</text>
      <text x="850" y="303" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">视觉缺语义、语音缺布局、融合图残余冲突。</text>
    </g>
    <g id="evidence-2">
      <path fill="#CCFBF1" d="M766,330 H822 A8,8 0 0 1 830,338 V356 A8,8 0 0 1 822,364 H766 A8,8 0 0 1 758,356 V338 A8,8 0 0 1 766,330 Z" />
      <text x="794" y="353" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#0F766E">G0:T</text>
      <text x="850" y="353" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">解释每一步修复</text>
      <text x="850" y="381" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">新增节点、补边、删错边、纠正方向都可回放。</text>
    </g>
    <g id="evidence-3">
      <path fill="#FEF3C7" d="M766,408 H822 A8,8 0 0 1 830,416 V434 A8,8 0 0 1 822,442 H766 A8,8 0 0 1 758,434 V416 A8,8 0 0 1 766,408 Z" />
      <text x="794" y="431" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#F59E0B">GED↓</text>
      <text x="850" y="431" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">把解释落到指标</text>
      <text x="850" y="459" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">Normalized GED、Edit Cost、Path Energy 都能量化。</text>
    </g>
    <g id="evidence-4">
      <path fill="#DCFCE7" d="M766,486 H822 A8,8 0 0 1 830,494 V512 A8,8 0 0 1 822,520 H766 A8,8 0 0 1 758,512 V494 A8,8 0 0 1 766,486 Z" />
      <text x="794" y="509" text-anchor="middle" font-family="Consolas, monospace" font-size="15" font-weight="700" fill="#16A34A">trace</text>
      <text x="850" y="509" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">把用户反馈变成数据</text>
      <text x="850" y="537" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#475569">真实修改轨迹可用于训练权重、排序器和交互策略。</text>
    </g>
  </g>
  <g id="bottom-takeaway">
    <path fill="#155E75" d="M184,612 H1096 A8,8 0 0 1 1104,620 V648 A8,8 0 0 1 1096,656 H184 A8,8 0 0 1 176,648 V620 A8,8 0 0 1 184,612 Z" />
    <text x="640" y="641" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">这让系统从“能生成”提升为“能解释、能评测、能被真实使用数据持续改进”。</text>

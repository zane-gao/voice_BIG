<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#172033" flood-opacity="0.08" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E" />
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC" />
  </g>
  <g id="header">
    <text x="60" y="70" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="36" font-weight="800" fill="#172033">科研定位：语音引导的知识草图结构化</text>
    <text x="60" y="106" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">我们研究的不是“语音转文字 + 大模型画图”，而是多模态知识结构恢复问题。</text>
  </g>
  <g id="problem-equation">
    <path fill="#155E75" filter="url(#softShadow)" d="M100,148 H1180 A8,8 0 0 1 1188,156 V244 A8,8 0 0 1 1180,252 H100 A8,8 0 0 1 92,244 V156 A8,8 0 0 1 100,148 Z" />
    <text x="280" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="25" font-weight="700" fill="#E0F2FE">Input</text>
    <image href="data:image/png;base64," x="402" y="166" width="475" height="60" />
    <text x="1000" y="194" text-anchor="middle" font-family="Consolas, monospace" font-size="25" font-weight="700" fill="#E0F2FE">Output</text>
    <text x="640" y="232" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#E0F2FE">S 是手绘知识草图，U 是同步语音描述，输出是可编辑、可评测、可渲染的结构化知识图。</text>
  </g>
  <g id="modality-complement">
    <g id="sketch-prior">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M78,304 H412 A8,8 0 0 1 420,312 V474 A8,8 0 0 1 412,482 H78 A8,8 0 0 1 70,474 V312 A8,8 0 0 1 78,304 Z" />
      <path fill="#2563EB" d="M74,304 H416 A4,4 0 0 1 420,308 V308 A4,4 0 0 1 416,312 H74 A4,4 0 0 1 70,308 V308 A4,4 0 0 1 74,304 Z" />
      
  <g transform="translate(100.0, 334.0) scale(1.6666666666666667)" fill="none" stroke="#2563EB" stroke-width="2">
    <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" />
    <path d="M13.5 6.5l4 4" />
  </g>
      <text x="158" y="360" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="23" font-weight="800" fill="#172033">草图：空间先验</text>
      <text x="100" y="406" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">能表达上下游、并行分支、层级</text>
      <text x="100" y="434" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">和反馈闭环，但文字和箭头不稳。</text>
    </g>
    <g id="speech-anchor">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M473,304 H807 A8,8 0 0 1 815,312 V474 A8,8 0 0 1 807,482 H473 A8,8 0 0 1 465,474 V312 A8,8 0 0 1 473,304 Z" />
      <path fill="#0F766E" d="M469,304 H811 A4,4 0 0 1 815,308 V308 A4,4 0 0 1 811,312 H469 A4,4 0 0 1 465,308 V308 A4,4 0 0 1 469,304 Z" />
      
  <g transform="translate(495.0, 334.0) scale(1.6666666666666667)" fill="none" stroke="#0F766E" stroke-width="2">
    <path d="M9 5a3 3 0 0 1 3 -3a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3a3 3 0 0 1 -3 -3l0 -5" />
    <path d="M5 10a7 7 0 0 0 14 0" />
    <path d="M8 21l8 0" />
    <path d="M12 17l0 4" />
  </g>
      <text x="553" y="360" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="23" font-weight="800" fill="#172033">语音：语义锚点</text>
      <text x="495" y="406" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">能补充节点名称、顺序、因果</text>
      <text x="495" y="434" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">和设计意图，但没有二维布局。</text>
    </g>
    <g id="kg-target">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M868,304 H1202 A8,8 0 0 1 1210,312 V474 A8,8 0 0 1 1202,482 H868 A8,8 0 0 1 860,474 V312 A8,8 0 0 1 868,304 Z" />
      <path fill="#16A34A" d="M864,304 H1206 A4,4 0 0 1 1210,308 V308 A4,4 0 0 1 1206,312 H864 A4,4 0 0 1 860,308 V308 A4,4 0 0 1 864,304 Z" />
      
  <g transform="translate(890.0, 334.0) scale(1.6666666666666667)" fill="none" stroke="#16A34A" stroke-width="2">
    <path d="M6 9a6 6 0 1 0 12 0a6 6 0 0 0 -12 0" />
    <path d="M12 3c1.333 .333 2 2.333 2 6s-.667 5.667 -2 6" />
    <path d="M12 3c-1.333 .333 -2 2.333 -2 6s.667 5.667 2 6" />
    <path d="M6 9h12" />
    <path d="M3 20h7" />
    <path d="M14 20h7" />
    <path d="M10 20a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
    <path d="M12 15v3" />
  </g>
      <text x="948" y="360" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="23" font-weight="800" fill="#172033">目标：结构化图</text>
      <text x="890" y="406" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">恢复节点、边、方向、语义标签、</text>
      <text x="890" y="434" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">置信度和布局关系，而非只生成图像。</text>
    </g>
  </g>
  <g id="hypotheses">
    <path fill="#FFFFFF" stroke="#CBD5E1" d="M98,534 H1182 A8,8 0 0 1 1190,542 V604 A8,8 0 0 1 1182,612 H98 A8,8 0 0 1 90,604 V542 A8,8 0 0 1 98,534 Z" />
    <text x="120" y="566" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" font-weight="800" fill="#155E75">研究假设</text>
    <text x="120" y="596" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#475569">H1 语音补全草图中缺失或难识别的节点标签；H2 口头叙述顺序纠正模糊边方向；H3 显式图编辑路径降低用户修改成本并提供路径能量诊断。</text>
  </g>
  <g id="footer">
    <text x="60" y="680" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">SketchVoice · Research Positioning</text>
    <text x="1220" y="680" text-anchor="end" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" fill="#94A3B8">07 / 14</text>
  </g>
</svg>
    <path d="M14 20h7" />
    <path d="M10 20a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
    <path d="M12 15v3" />
  </g>
      <text x="636" y="256" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">恢复结构</text>
    </g>
    <path d="M 742 249 L 822 249" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrowEnd)" />

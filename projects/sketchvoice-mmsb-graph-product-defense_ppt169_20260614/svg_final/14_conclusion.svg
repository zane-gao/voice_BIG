<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="3" result="offsetBlur" />
      <feFlood flood-color="#172033" flood-opacity="0.09" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0F766E" />
    </marker>
  </defs>
  <g id="background">
    <rect width="1280" height="720" fill="#F8FAFC" />
    <rect x="0" y="0" width="1280" height="18" fill="#155E75" />
  </g>
  <g id="hero-summary">
    <text x="640" y="110" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="44" font-weight="800" fill="#172033">总结：产品闭环 + 方法支撑 + 可评测系统</text>
    <text x="640" y="154" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#475569">SketchVoice 将“语音 + 草图”的自然表达过程，转化为可编辑、可导出、可评价的知识图。</text>
  </g>
  <g id="product-flow">

      <text x="342" y="256" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">说清语义</text>
    </g>
    <path d="M 450 249 L 530 249" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrowEnd)" />

  </g>
      <text x="928" y="256" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">交付结果</text>
    </g>
  </g>
  <g id="contributions">
    <g id="contribution-product">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M92,346 H418 A8,8 0 0 1 426,354 V534 A8,8 0 0 1 418,542 H92 A8,8 0 0 1 84,534 V354 A8,8 0 0 1 92,346 Z" />
      
  <g transform="translate(112.0, 374.0) scale(1.6666666666666667)" fill="none" stroke="#155E75" stroke-width="2">
    <path d="M3 5a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-10" />
    <path d="M7 20h10" />
    <path d="M9 16v4" />
    <path d="M15 16v4" />
  </g>
      <text x="170" y="404" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="24" font-weight="800" fill="#172033">产品层</text>
      <text x="112" y="458" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">构建 SketchVoice 方法图工作台，</text>
      <text x="112" y="490" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">支持草图、语音、文本到图结构的</text>
      <text x="112" y="522" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#475569">连续交互与导出。</text>
    </g>
    <g id="contribution-method">
      <path fill="#FFFFFF" stroke="#CBD5E1" filter="url(#softShadow)" d="M477,346 H803 A8,8 0 0 1 811,354 V534 A8,8 0 0 1 803,542 H477 A8,8 0 0 1 469,534 V354 A8,8 0 0 1 477,346 Z" />
      
  <g transform="translate(497.0, 374.0) scale(1.6666666666666667)" fill="none" stroke="#0F766E" stroke-width="2">
    <path d="M5 18a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M5 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
    <path d="M15 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
